<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KickScroll Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e24; color: #fff; width: 280px; padding: 15px; margin: 0; }
    h2 { margin-top: 0; font-size: 18px; border-bottom: 2px solid #00e701; padding-bottom: 8px; color: #00e701; }
    .script-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
    .script-row:last-child { border-bottom: none; }
    .script-name { font-size: 14px; font-weight: 500; }
    
    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #00e701; }
    input:focus + .slider { box-shadow: 0 0 1px #00e701; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <h2>Userscripts</h2>
  
  <div class="script-row">
    <span class="script-name">NipahTV (Emotes)</span>
    <label class="switch"><input type="checkbox" id="toggle-ntv"><span class="slider"></span></label>
  </div>
  
  <div class="script-row">
    <span class="script-name">Max Stream Quality</span>
    <label class="switch"><input type="checkbox" id="toggle-quality"><span class="slider"></span></label>
  </div>
  
  <div class="script-row">
    <span class="script-name">Sidebar Tweaks</span>
    <label class="switch"><input type="checkbox" id="toggle-sidebar"><span class="slider"></span></label>
  </div>
  
  <div class="script-row">
    <span class="script-name">Display & Navbar Fixes</span>
    <label class="switch"><input type="checkbox" id="toggle-fixes"><span class="slider"></span></label>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
